name: Build Gallery

on:
  push:
    branches: [main]

jobs:
  build-gallery:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Install ffmpeg
        run: sudo apt-get update && sudo apt-get install -y ffmpeg

      # Cache Playwright's bundled Chromium across runs (keyed on the lockfile,
      # which pins the Playwright version).
      - name: Cache Playwright browsers
        uses: actions/cache@v4
        with:
          path: ~/.cache/ms-playwright
          key: playwright-${{ runner.os }}-${{ hashFiles('package-lock.json') }}

      - name: Install Playwright Chromium
        run: npx playwright install --with-deps chromium

      # Regenerate app previews (animated WebP + poster). The script content-hashes
      # each app and skips unchanged ones, so this is cheap when nothing changed.
      - name: Generate previews
        run: node scripts/capture_previews.mjs

      - name: Generate gallery index
        run: python scripts/build_gallery.py

      - name: Commit gallery + previews
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add index.html previews
          git diff --staged --quiet || git commit -m "chore: rebuild gallery + previews"
          git push
