<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <link rel="stylesheet" type="text/css" href="style.css">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Makeability Lab Shape Morph</title>
  
  <!-- The makelab library, loaded directly from source (src/lib) so local edits
       show up on reload with no build step. Developers consuming the published
       library can instead point this specifier at the jsDelivr CDN:
       https://cdn.jsdelivr.net/gh/makeabilitylab/js@main/dist/makelab.all.js -->
  <script type="importmap">
    { "imports": { "makelab": "../../../lib/index.js" } }
  </script>
</head>
<body>
  <div id="controls">
    <label for="shapeSelect">Holiday:</label>
    <select id="shapeSelect">
      <option value="../../../lib/logo/art_data/heart.json">Heart</option>
      <option value="../../../lib/logo/art_data/santa.json">Santa</option>
      <option value="../../../lib/logo/art_data/jack-o-lantern.json">Jack-O-Lantern</option>
      <option value="../../../lib/logo/art_data/pumpkin.json">Pumpkin</option>
      <option value="../../../lib/logo/art_data/shamrock.json">St. Patrick's Day Shamrock</option>
      <option value="../../../lib/logo/art_data/uw.json">UW Purple W</option>
    </select>
  </div>

  <main class="container">
    <!-- Visually hidden heading: gives screen-reader users a proper page title
         to navigate by. The canvas is just an image, so without this the page
         would have no heading. Hidden from sighted users via .visually-hidden. -->
    <h1 class="visually-hidden">Makeability Lab Shape Morph</h1>
    <canvas id="myCanvas" role="img"
      aria-label="Animation: triangle-grid art morphing between holiday shapes"></canvas>
  </main>
  
  <script type="module" src="sketch.js"></script>
</body>
</html>
